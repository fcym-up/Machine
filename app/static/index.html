 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Machine</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="css/style.css?ts=1783603798">
   <link rel="stylesheet" href="css/animations.css?ts=1783603798">
 </head>
 <body>
   <script type="importmap">
   {
     "imports": {
       "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
     }
   }
   </script>
 
   <div id="three-container"></div>
 
   <div id="app-layout">
     <div id="left-panel">
      <!-- Online Status -->
      <div id="status-online" class="status-item">
        <span class="dot-green"></span>
        <span id="status-text" class="status-value">Online</span>
      </div>

      <!-- Observe Section -->
      <div id="observe-section">
        <div class="section-label">Observe</div>
        <div class="observe-row">
          <span class="observe-label">当前行为</span>
          <span id="current-activity" class="observe-value">--</span>
        </div>
        <div class="observe-row">
          <span class="observe-label">专注度</span>
          <span id="focus-level" class="observe-value">--</span>
        </div>
        <div class="observe-row">
          <span class="observe-label">今日专注</span>
          <span id="today-session" class="observe-value">--</span>
        </div>
        <div class="observe-row">
          <span class="observe-label">当前阶段</span>
          <span id="current-phase" class="observe-value">--</span>
        </div>
      </div>

      <!-- Voice Status Section -->
      <div id="voice-section">
      <div class="section-label">Voice Status</div>
      <div id="voice-status-text" class="voice-status">唤醒词模式</div>
      <div id="voice-hint" class="voice-hint">说 "终端"</div>
        </div>
    </div>

    <div id="center-stage">
       <div id="core-overlay">
         <h1 id="core-title">Machine</h1>
         <p id="core-subtitle">我一直都在。</p>
         <p id="core-hint">说 "终端"</p>
         <div id="analyzing-list"></div>
         <div id="core-response"></div>
       </div>
     </div>
 
     <div id="timeline-panel">
       <div id="timeline-header">Timeline</div>
       <div id="timeline-list"></div>
       <div id="understanding-panel">
         <div id="understanding-body"></div>
       </div>
     </div>
   </div>
 
   <div id="dock">
     <div class="dock-item active" data-view="voice" title="Voice">
       <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
       <span class="dock-dot"></span>
     </div>
     <div class="dock-item" data-view="observation" title="Observation">
       <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
       <span class="dock-dot"></span>
     </div>
     <div class="dock-item" data-view="memory" title="Memory">
       <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
       <span class="dock-dot"></span>
     </div>
     <div class="dock-item" data-view="knowledge" title="Knowledge">
       <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="M9 9.5V8a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1.5"/></svg>
       <span class="dock-dot"></span>
     </div>
     
    <div class="dock-item" data-view="tasks" title="Tasks">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
      <span class="dock-dot"></span>
    </div>
    <div class="dock-item" data-view="settings" title="Settings">
       <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
       <span class="dock-dot"></span>
     </div>
   </div>
 
   <script src="assets/icons.js?ts=1783585467"></script>
   <script type="module" src="js/particle-core.js?ts=1783585467"></script>
   <script type="module" src="js/voice.js?ts=1783605506"></script>
    <script type="module" src="js/timeline.js?ts=1783585467"></script>
   <script type="module" src="js/app.js?ts=1783605506"></script>
 </body>
 </html>
